<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>GesturPlay Worker</title></head>
<body>
<video id="v" autoplay muted playsinline
  style="position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;opacity:0"></video>
<script>
const cfg={hand:'right',fps:12,confidence:0.75,cooldown:1500};
let handLandmarker=null,stream=null,frameTimer=null;
let lastGesture=null,lastGestureTime=0;
let lastFrameTime=0,detectionActive=true;

const posHistory=[];
const HIST=18;
let stillCount=0;
let maxRecentMotion=0;

// Tuned thresholds
const STILL_FRAMES=10;   // ~0.85s stillness = pause
const STILL_THRESH=0.03;
const MIN_MOTION_FOR_PAUSE=0.12; // must have moved significantly first
const SWIPE_MIN=0.22;    // horizontal swipe minimum
const VERT_MIN=0.22;     // vertical minimum — increased to reduce false vol triggers
const DIRECTION_RATIO=2.0; // must be twice as strong in one direction

const vid=document.getElementById('v');

function send(type,extra={}){
  try{window.parent.postMessage({type,...extra},'*');}catch(e){}
}

window.addEventListener('message',(e)=>{
  const msg=e.data;
  if(!msg||!msg.type) return;
  if(msg.type==='GP_INIT')   start(msg.cfg);
  if(msg.type==='GP_STOP')   teardown();
  if(msg.type==='GP_PAUSE')  detectionActive=false;
  if(msg.type==='GP_RESUME') detectionActive=true;
  if(msg.type==='GP_HAND')   cfg.hand=msg.hand;
});

function triggerGesture(g){
  const now=Date.now();
  if(g===lastGesture&&now-lastGestureTime<cfg.cooldown) return;
  lastGesture=g; lastGestureTime=now;
  posHistory.length=0;
  stillCount=0; maxRecentMotion=0;
  send('GP_GESTURE',{gesture:g});
}

function classifyFromHistory(){
  // Need at least 8 frames of consistent data
  if(posHistory.length < 8) return null;

  const recent = posHistory.slice(-10);
  const xs=recent.map(p=>p.x);
  const ys=recent.map(p=>p.y);
  const dx=xs[xs.length-1]-xs[0];
  const dy=ys[ys.length-1]-ys[0];
  const absDx=Math.abs(dx);
  const absDy=Math.abs(dy);

  // Must have meaningful total travel
  const totalTravel = Math.hypot(absDx, absDy);
  if(totalTravel < 0.15) return null;

  // PLAY — strong horizontal right-to-left
  // horizontal must dominate vertical significantly
  if(absDx > SWIPE_MIN && absDx > absDy * DIRECTION_RATIO){
    if(dx < -SWIPE_MIN) return 'play';
  }

  // VOLUME — strong vertical, must dominate horizontal significantly
  // Extra check: majority of frames must move in same vertical direction
  if(absDy > VERT_MIN && absDy > absDx * DIRECTION_RATIO){
    // Check consistency — count frames moving in dominant direction
    let upFrames=0, dnFrames=0;
    for(let i=1;i<recent.length;i++){
      if(recent[i].y < recent[i-1].y) upFrames++;
      else dnFrames++;
    }
    const consistency = recent.length - 1;
    // Need 70% of frames moving same direction
    if(dy < -VERT_MIN && upFrames/consistency > 0.7) return 'vol_up';
    if(dy >  VERT_MIN && dnFrames/consistency > 0.7) return 'vol_dn';
  }

  return null;
}

function processLandmarks(landmarks){
  if(!landmarks||!landmarks.length){
    stillCount++;
    if(stillCount===STILL_FRAMES && maxRecentMotion > MIN_MOTION_FOR_PAUSE){
      triggerGesture('pause');
    }
    return;
  }

  stillCount=0;
  const lm=landmarks[0];
  const wrist={x:lm[0].x, y:lm[0].y};

  posHistory.push(wrist);
  if(posHistory.length>HIST) posHistory.shift();

  if(posHistory.length>=2){
    const prev=posHistory[posHistory.length-2];
    const movement=Math.hypot(wrist.x-prev.x, wrist.y-prev.y);
    if(movement>maxRecentMotion) maxRecentMotion=movement;
    maxRecentMotion*=0.95;
  }

  const g=classifyFromHistory();
  if(g) triggerGesture(g);
}

async function start(config){
  if(handLandmarker) return;
  if(config) Object.assign(cfg,config);
  try{
    stream=await navigator.mediaDevices.getUserMedia({
      video:{width:320,height:240,facingMode:'user',frameRate:{ideal:15,max:20}}
    });
  }catch(err){
    send('GP_CAM_ERROR',{errType:err.name==='NotFoundError'?'no_camera':'permission_denied'});
    return;
  }
  vid.srcObject=stream;
  try{await vid.play();}catch(e){}

  try{
    const mp=await import('https://esm.sh/@mediapipe/tasks-vision@0.10.7');
    const {HandLandmarker,FilesetResolver}=mp;
    const vision=await FilesetResolver.forVisionTasks(
      'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.7/wasm'
    );
    handLandmarker=await HandLandmarker.createFromOptions(vision,{
      baseOptions:{
        modelAssetPath:'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task',
        delegate:'CPU'
      },
      runningMode:'VIDEO',numHands:1,
      minHandDetectionConfidence:cfg.confidence,
      minHandPresenceConfidence:cfg.confidence,
      minTrackingConfidence:0.5,
    });
  }catch(e){
    console.error('MediaPipe error:',e);
    send('GP_LOAD_ERROR'); return;
  }

  const interval=1000/cfg.fps;
  function frame(ts){
    if(!handLandmarker) return;
    if(detectionActive&&ts-lastFrameTime>=interval){
      lastFrameTime=ts;
      try{
        const results=handLandmarker.detectForVideo(vid,ts);
        processLandmarks(results.landmarks);
      }catch(e){}
    }
    frameTimer=requestAnimationFrame(frame);
  }
  frameTimer=requestAnimationFrame(frame);
  send('GP_READY');
}

function teardown(){
  if(frameTimer){cancelAnimationFrame(frameTimer);frameTimer=null;}
  if(handLandmarker){try{handLandmarker.close();}catch(e){}handLandmarker=null;}
  if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}
  posHistory.length=0; stillCount=0; maxRecentMotion=0;
}

window.addEventListener('load',()=>send('GP_PAGE_READY'));
</script>
</body>
</html>
